<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<!-- 🔹 Navbar -->
<header class="navbar">
  <div class="logo">ExamPrep</div>
  <button onclick="logout()">Logout</button>
</header>

<!-- 🔹 Welcome -->
<section class="welcome">
  <h2 id="welcomeText">Welcome</h2>
</section>

<!-- 🔹 Categories -->
<section class="categories">
  <h3>Choose Quiz</h3>

  <div class="card-container">

    <div class="card" onclick="startQuiz('math')">Mathematics</div>
    <div class="card" onclick="startQuiz('science')">Science</div>
    <div class="card" onclick="startQuiz('gk')">General Knowledge</div>
    <div class="card" onclick="startQuiz('english')">English</div>
    <div class="card" onclick="startQuiz('computer')">Computer</div>

  </div>
</section>

<script src="js/dashboard.js"></script>
</body>
</html>
