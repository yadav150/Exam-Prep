<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<!-- 🔹 Navbar -->
<header class="navbar">
  <div class="logo">ExamPrep</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="leaderboard.html">Leaderboard</a>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </nav>
</header>

<!-- 🔹 Welcome -->
<section class="welcome">
  <div class="container">
    <h2 id="welcomeText">Welcome 👋</h2>
  </div>
</section>

<!-- 🔹 Categories -->
<section class="categories">
  <div class="container">
    <h3>Choose Quiz</h3>

    <div class="card-container">

      <button class="card" onclick="startQuiz('math')">Mathematics</button>
      <button class="card" onclick="startQuiz('science')">Science</button>
      <button class="card" onclick="startQuiz('gk')">General Knowledge</button>
      <button class="card" onclick="startQuiz('english')">English</button>
      <button class="card" onclick="startQuiz('computer')">Computer</button>

    </div>
  </div>
</section>

<!-- 🔻 Footer -->
<footer class="footer">
  <p>Made with ❤️ by Yadav Subba</p>
</footer>

<script src="js/dashboard.js"></script>
</body>
</html>
