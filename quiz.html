<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz - ExamPrep</title>
  <link rel="stylesheet" href="css/quiz.css">
</head>
<body>

<!-- 🔹 Navbar -->
<header class="navbar">
  <div class="logo">ExamPrep</div>
</header>

<!-- 🔹 Quiz Wrapper -->
<div class="quiz-wrapper">

  <!-- 🔹 Quiz Container -->
  <div class="quiz-container">

    <!-- Category -->
    <div class="quiz-top">
      <h4 id="quizCategoryText">Category</h4>
      <h3 id="timer">Time Left: 30s</h3>
    </div>

    <!-- Question -->
    <h2 id="question">Loading question...</h2>

    <!-- Options -->
    <div class="options">
      <button class="option">Option 1</button>
      <button class="option">Option 2</button>
      <button class="option">Option 3</button>
      <button class="option">Option 4</button>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button id="nextBtn">Next</button>
    </div>

  </div>

</div>

<script src="js/quiz.js"></script>
</body>
</html>
