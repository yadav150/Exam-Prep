<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<h2>Add Question</h2>

<div class="form">

  <input type="text" id="category" placeholder="Category (math/science)">
  <input type="text" id="set" placeholder="Set (set1/set2)">
  <input type="text" id="question" placeholder="Question">

  <input type="text" id="opt1" placeholder="Option 1">
  <input type="text" id="opt2" placeholder="Option 2">
  <input type="text" id="opt3" placeholder="Option 3">
  <input type="text" id="opt4" placeholder="Option 4">

  <input type="text" id="answer" placeholder="Correct Answer">

  <button onclick="addQuestion()">Add Question</button>

</div>

<script src="js/admin.js"></script>
</body>
</html>
