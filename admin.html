<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - ExamPrep</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<header class="navbar">
  <div class="logo">Admin Panel</div>
</header>

<div class="admin-container">

  <h2>Add Quiz Question</h2>

  <select id="category">
    <option value="math">Math</option>
    <option value="science">Science</option>
    <option value="gk">GK</option>
    <option value="english">English</option>
    <option value="computer">Computer</option>
  </select>

  <input type="text" id="question" placeholder="Enter question">

  <input type="text" id="opt1" placeholder="Option 1">
  <input type="text" id="opt2" placeholder="Option 2">
  <input type="text" id="opt3" placeholder="Option 3">
  <input type="text" id="opt4" placeholder="Option 4">

  <input type="text" id="answer" placeholder="Correct answer">

  <button onclick="addQuestion()">Add Question</button>
  <button onclick="exportJSON()">Export JSON</button>

  <hr>

  <h3>Preview Questions</h3>
  <div id="preview"></div>

</div>

<script src="js/admin.js"></script>
</body>
</html>
